services:
  postgres:
    image: postgres:16-alpine
    container_name: vehicle-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vehicle_tracker
      POSTGRES_PASSWORD: vehicle_tracker_password
      POSTGRES_DB: vehicle_tracker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vehicle_tracker -d vehicle_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vehicle-tracker-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vehicle_tracker:vehicle_tracker_password@postgres:5432/vehicle_tracker?schema=public
      JWT_SECRET: docker-local-secret-change-me
      JWT_EXPIRES_IN: 1d
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    container_name: vehicle-tracker-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
